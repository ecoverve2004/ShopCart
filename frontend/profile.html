<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ShopEasy E-Commerce | WooCommerce Account</title>
    <meta name="description" content="Manage your ShopEasy e-commerce account. View orders, update profile, and track shipments on our WooCommerce platform.">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }
        
        .profile-sidebar {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: white;
        }
        
        .profile-sidebar h3 {
            text-align: center;
            margin-bottom: 5px;
        }
        
        .profile-sidebar p {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .profile-menu {
            list-style: none;
            padding: 0;
        }
        
        .profile-menu li {
            margin-bottom: 5px;
        }
        
        .profile-menu a {
            display: block;
            padding: 12px 15px;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .profile-menu a:hover, .profile-menu a.active {
            background: #f0f8ff;
            color: #007bff;
        }
        
        .profile-menu a i {
            margin-right: 10px;
            width: 20px;
        }
        
        .profile-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .profile-content h2 {
            margin-bottom: 25px;
            color: #333;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            color: #007bff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0056b3;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .order-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .order-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .order-id {
            font-weight: bold;
            color: #007bff;
        }
        
        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-processing {
            background: #cce5ff;
            color: #004085;
        }
        
        .status-shipped {
            background: #d4edda;
            color: #155724;
        }
        
        .status-delivered {
            background: #d4edda;
            color: #155724;
        }
        
        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }
        
        .order-items {
            margin-bottom: 15px;
        }
        
        .order-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }
        
        .order-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #007bff;
        }
        
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            
            .profile-sidebar {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>ShopEasy</h2>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#products" class="nav-link">Products</a>
                <a href="features.html" class="nav-link">Features</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="faq.html" class="nav-link">FAQ</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="index.html#cart-btn" class="icon-btn" id="cart-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cart-count">0</span>
                </a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-sidebar">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h3 id="user-name">User Name</h3>
            <p id="user-email">user@email.com</p>
            
            <ul class="profile-menu">
                <li><a href="#profile" class="active" data-tab="profile"><i class="fas fa-user"></i> My Profile</a></li>
                <li><a href="#orders" data-tab="orders"><i class="fas fa-box"></i> My Orders</a></li>
                <li><a href="#addresses" data-tab="addresses"><i class="fas fa-map-marker-alt"></i> Addresses</a></li>
                <li><a href="#password" data-tab="password"><i class="fas fa-lock"></i> Change Password</a></li>
            </ul>
            
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <div class="profile-content">
            <!-- Profile Tab -->
            <div class="tab-content active" id="tab-profile">
                <h2><i class="fas fa-user-circle"></i> My Profile</h2>
                <form id="profile-form">
                    <div class="form-section">
                        <h3>Personal Information</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="profile-name">Full Name</label>
                                <input type="text" id="profile-name" required>
                            </div>
                            <div class="form-group">
                                <label for="profile-email">Email Address</label>
                                <input type="email" id="profile-email" disabled>
                            </div>
                            <div class="form-group">
                                <label for="profile-phone">Phone Number</label>
                                <input type="tel" id="profile-phone">
                            </div>
                            <div class="form-group">
                                <label for="profile-country">Country</label>
                                <select id="profile-country">
                                    <option value="US">United States</option>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="AU">Australia</option>
                                    <option value="IN">India</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
            
            <!-- Orders Tab -->
            <div class="tab-content" id="tab-orders">
                <h2><i class="fas fa-box"></i> My Orders</h2>
                <div id="orders-list">
                    <!-- Orders will be loaded here -->
                </div>
            </div>
            
            <!-- Addresses Tab -->
            <div class="tab-content" id="tab-addresses">
                <h2><i class="fas fa-map-marker-alt"></i> My Addresses</h2>
                <div id="addresses-list">
                    <p>No saved addresses.</p>
                </div>
            </div>
            
            <!-- Password Tab -->
            <div class="tab-content" id="tab-password">
                <h2><i class="fas fa-lock"></i> Change Password</h2>
                <form id="password-form">
                    <div class="form-section">
                        <div class="form-group">
                            <label for="current-password">Current Password</label>
                            <input type="password" id="current-password" required>
                        </div>
                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-key"></i> Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        // Check if user is logged in
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            
            if (!token || !user) {
                window.location.href = 'index.html#login-modal';
                return false;
            }
            return true;
        }
        
        // Load user profile
        async function loadProfile() {
            if (!checkAuth()) return;
            
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));
            
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('profile-name').value = user.name;
            document.getElementById('profile-email').value = user.email;
            document.getElementById('profile-phone').value = user.phone || '';
            
            // Load full profile from API
            try {
                const response = await fetch(`${API_URL}/user/profile`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const profile = await response.json();
                    document.getElementById('profile-name').value = profile.name || user.name;
                    document.getElementById('profile-phone').value = profile.phone || '';
                    document.getElementById('profile-country').value = profile.country || 'US';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }
        
        // Load user orders
        async function loadOrders() {
            if (!checkAuth()) return;
            
            const token = localStorage.getItem('token');
            const container = document.getElementById('orders-list');
            
            try {
                const response = await fetch(`${API_URL}/user/orders`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const orders = await response.json();
                
                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>No orders yet</h3>
                            <p>Start shopping to see your orders here!</p>
                            <a href="index.html" class="btn btn-primary">Shop Now</a>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">#${order.id.substring(0, 8).toUpperCase()}</span>
                                <span style="color: #666; margin-left: 10px;">${new Date(order.createdAt).toLocaleDateString()}</span>
                            </div>
                            <span class="order-status status-${order.status}">${order.status}</span>
                        </div>
                        <div class="order-items">
                            ${order.items.slice(0, 2).map(item => `
                                <div class="order-item">
                                    <img src="${item.image}" alt="${item.name}">
                                    <div>
                                        <strong>${item.name}</strong>
                                        <p>Qty: ${item.quantity} × $${item.price.toFixed(2)}</p>
                                    </div>
                                </div>
                            `).join('')}
                            ${order.items.length > 2 ? `<p style="color: #666;">+${order.items.length - 2} more items</p>` : ''}
                        </div>
                        <div class="order-footer">
                            <span class="order-total">Total: $${order.total.toFixed(2)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = '<p>Error loading orders. Please try again.</p>';
            }
        }
        
        // Update profile
        document.getElementById('profile-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = localStorage.getItem('token');
            const profileData = {
                name: document.getElementById('profile-name').value,
                phone: document.getElementById('profile-phone').value,
                country: document.getElementById('profile-country').value
            };
            
            try {
                const response = await fetch(`${API_URL}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(profileData)
                });
                
                if (response.ok) {
                    const updatedUser = await response.json();
                    localStorage.setItem('user', JSON.stringify(updatedUser));
                    document.getElementById('user-name').textContent = updatedUser.name;
                    showToast('Profile updated successfully!', 'success');
                } else {
                    showToast('Failed to update profile', 'error');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showToast('An error occurred', 'error');
            }
        });
        
        // Change password
        document.getElementById('password-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showToast('New passwords do not match', 'error');
                return;
            }
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/user/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('Password updated successfully!', 'success');
                    document.getElementById('password-form').reset();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                console.error('Error changing password:', error);
                showToast('An error occurred', 'error');
            }
        });
        
        // Tab switching
        document.querySelectorAll('.profile-menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                
                document.querySelectorAll('.profile-menu a').forEach(l => l.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                
                link.classList.add('active');
                document.getElementById(`tab-${link.dataset.tab}`).classList.add('active');
                
                // Load orders when switching to orders tab
                if (link.dataset.tab === 'orders') {
                    loadOrders();
                }
            });
        });
        
        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        
        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            
            setTimeout(() => {
                toast.className = toast.className.replace('show', '');
            }, 3000);
        }
        
        // Update cart count
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadProfile();
                updateCartCount();
            }
        });
    </script>
</body>
</html>
