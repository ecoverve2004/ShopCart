<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopEasy E-Commerce | Secure Payment</title>
    <meta name="description" content="Secure checkout on ShopEasy e-commerce platform. Complete your purchase with WooCommerce integration.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
        }
        
        .checkout-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .checkout-form h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            margin-bottom: 15px;
            color: #007bff;
            font-size: 1.2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .order-summary {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .order-summary h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .order-items {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .order-item {
            display: flex;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .order-item-details {
            flex: 1;
        }
        
        .order-item-details h4 {
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        
        .order-item-details p {
            color: #666;
            font-size: 0.85rem;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row.total {
            border-bottom: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: #007bff;
            padding-top: 15px;
        }
        
        .place-order-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .place-order-btn:hover {
            background: #218838;
        }
        
        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .payment-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .payment-option:hover {
            border-color: #007bff;
        }
        
        .payment-option.selected {
            border-color: #007bff;
            background: #f0f8ff;
        }
        
        .payment-option i {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }
        
        .guest-notice {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .guest-notice a {
            color: #007bff;
            font-weight: bold;
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px;
        }
        
        .empty-cart i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .empty-cart a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        @media (max-width: 900px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            
            .order-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>ShopEasy</h2>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#products" class="nav-link">Products</a>
                <a href="features.html" class="nav-link">Features</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="faq.html" class="nav-link">FAQ</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="index.html#cart-btn" class="icon-btn" id="cart-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cart-count">0</span>
                </a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="checkout-container" id="checkout-content">
        <!-- Checkout form will be loaded here -->
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        // Check if cart is empty
        function loadCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('token');
            
            const container = document.getElementById('checkout-content');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="checkout-form" style="grid-column: 1 / -1;">
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <h2>Your cart is empty</h2>
                            <p>Add some products to your cart before checkout</p>
                            <a href="index.html">Continue Shopping</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 100 ? 0 : 10;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;
            
            let userForm = '';
            if (user && token) {
                userForm = `
                    <div class="form-section">
                        <h3><i class="fas fa-user"></i> Account Information</h3>
                        <p>Logged in as: <strong>${user.name}</strong> (${user.email})</p>
                    </div>
                `;
            } else {
                userForm = `
                    <div class="guest-notice">
                        <p>Checking out as guest? <a href="#" id="login-link">Login</a> for a better experience or continue below.</p>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="checkout-form">
                    <h2><i class="fas fa-shopping-bag"></i> Checkout</h2>
                    
                    ${userForm}
                    
                    <form id="checkout-form-element">
                        <div class="form-section">
                            <h3><i class="fas fa-shipping-fast"></i> Shipping Information</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">First Name *</label>
                                    <input type="text" id="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name *</label>
                                    <input type="text" id="lastName" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" value="${user?.email || ''}" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" required>
                            </div>
                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input type="text" id="city" required>
                                </div>
                                <div class="form-group">
                                    <label for="zipCode">ZIP Code *</label>
                                    <input type="text" id="zipCode" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="country">Country *</label>
                                <select id="country" required>
                                    <option value="">Select Country</option>
                                    <option value="US" selected>United States</option>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="AU">Australia</option>
                                    <option value="IN">India</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-section">
                            <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                            <div class="payment-methods">
                                <div class="payment-option selected" data-method="card">
                                    <i class="fas fa-credit-card"></i>
                                    <span>Credit/Debit Card</span>
                                </div>
                                <div class="payment-option" data-method="paypal">
                                    <i class="fab fa-paypal"></i>
                                    <span>PayPal</span>
                                </div>
                                <div class="payment-option" data-method="cod">
                                    <i class="fas fa-money-bill-wave"></i>
                                    <span>Cash on Delivery</span>
                                </div>
                            </div>
                            
                            <div id="card-details">
                                <div class="form-group">
                                    <label for="cardNumber">Card Number *</label>
                                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="expiry">Expiry Date *</label>
                                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                                    </div>
                                    <div class="form-group">
                                        <label for="cvv">CVV *</label>
                                        <input type="text" id="cvv" placeholder="123" maxlength="4">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="cardName">Name on Card *</label>
                                    <input type="text" id="cardName">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="order-summary">
                    <h2>Order Summary</h2>
                    <div class="order-items">
                        ${cart.map(item => `
                            <div class="order-item">
                                <img src="${item.image}" alt="${item.name}">
                                <div class="order-item-details">
                                    <h4>${item.name}</h4>
                                    <p>Qty: ${item.quantity} × $${item.price.toFixed(2)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (8%)</span>
                        <span>$${tax.toFixed(2)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <button class="place-order-btn" onclick="placeOrder()">
                        <i class="fas fa-lock"></i> Place Order
                    </button>
                    <p style="text-align: center; margin-top: 15px; font-size: 0.8rem; color: #666;">
                        <i class="fas fa-shield-alt"></i> Secure checkout - SSL encrypted
                    </p>
                </div>
            `;
            
            // Payment method selection
            document.querySelectorAll('.payment-option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
                    option.classList.add('selected');
                    
                    const method = option.dataset.method;
                    const cardDetails = document.getElementById('card-details');
                    if (method === 'card') {
                        cardDetails.style.display = 'block';
                    } else {
                        cardDetails.style.display = 'none';
                    }
                });
            });
            
            // Login link
            document.getElementById('login-link')?.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.setItem('redirectAfterLogin', 'checkout.html');
                window.location.href = 'index.html#login-modal';
            });
        }
        
        async function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('token');
            
            if (cart.length === 0) {
                showToast('Your cart is empty', 'error');
                return;
            }
            
            // Validate form
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const city = document.getElementById('city').value;
            const zipCode = document.getElementById('zipCode').value;
            const country = document.getElementById('country').value;
            
            if (!firstName || !lastName || !email || !phone || !address || !city || !zipCode || !country) {
                showToast('Please fill in all required fields', 'error');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 100 ? 0 : 10;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;
            
            const orderData = {
                items: cart,
                shipping: {
                    firstName,
                    lastName,
                    phone,
                    address,
                    city,
                    zipCode,
                    country
                },
                payment: {
                    method: document.querySelector('.payment-option.selected').dataset.method
                },
                total,
                email
            };
            
            try {
                const btn = document.querySelector('.place-order-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                
                let response;
                if (token) {
                    response = await fetch(`${API_URL}/orders`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(orderData)
                    });
                } else {
                    response = await fetch(`${API_URL}/orders/guest`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(orderData)
                    });
                }
                
                const result = await response.json();
                
                if (response.ok) {
                    // Clear cart
                    localStorage.removeItem('cart');
                    localStorage.setItem('lastOrder', JSON.stringify(result.order));
                    
                    // Redirect to confirmation
                    window.location.href = 'order-confirmation.html';
                } else {
                    showToast(result.message || 'Failed to place order', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Place Order';
                }
            } catch (error) {
                console.error('Error placing order:', error);
                showToast('An error occurred. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Place Order';
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            
            setTimeout(() => {
                toast.className = toast.className.replace('show', '');
            }, 3000);
        }
        
        // Update cart count
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCheckout();
            updateCartCount();
        });
    </script>
</body>
</html>
